# Alembic configuration for mom-bot.
#
# Production database URL is injected via the MOM_BOT_DATABASE_URL environment
# variable (see migrations/env.py).  The value below is the local-dev SQLite
# default only.

[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/migrations

# Template used to generate migration file names.
# Default: %%(rev)s_%%(slug)s  (e.g. a1b2c3d4e5f6_baseline.py)
# file_template = %%(rev)s_%%(slug)s

# sys.path entry prepended before imports; "." lets env.py import mom_bot
# when the package is installed in editable mode (pip install -e .).
prepend_sys_path = %(here)s/src

# Separator for path lists (version_locations, prepend_sys_path).
path_separator = os

# Local-dev SQLite default.  Override for prod/staging via MOM_BOT_DATABASE_URL.
sqlalchemy.url = sqlite:///./mom-bot.db


# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
