name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Run ruff
        run: ruff check src/ tests/

  format:
    name: Format (black)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Run black
        run: black --check src/ tests/

  types:
    name: Types (mypy)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Run mypy
        run: mypy src/

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Run pytest
        run: pytest

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Build Docker image
        run: docker build .

  pip-audit:
    name: pip-audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: uv pip install pip-audit --system
      - name: Run pip-audit
        run: pip-audit
