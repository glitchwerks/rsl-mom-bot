name: Bicep what-if (PR preview)

# Runs az deployment sub create --what-if on every PR touching infra/** and
# posts the diff as a sticky comment on the PR.
#
# Uses pull_request (not pull_request_target) — running ARM validation with
# privileged OIDC tokens via pull_request_target is a privilege-escalation
# footgun. pull_request runs in the fork-isolated context. The trade-off
# (forks can't get an OIDC token) is irrelevant here because mom-bot has no
# fork contributors.
#
# Informational only — what-if output is NOT a merge gate (Phase 1 per plan
# docs/superpowers/plans/2026-05-17-bicep-deploy-and-revision-cleanup.md).
# Write-permission verification belongs to Phase 2.
#
# Repo variables required (same as deploy.yml):
#   AZURE_CLIENT_ID        — app registration client ID (mom-bot-gha)
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — target Azure subscription ID

on:
  pull_request:
    paths:
      - 'infra/**'

concurrency:
  group: bicep-whatif-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write       # OIDC federation for Azure login
  contents: read        # actions/checkout
  pull-requests: write  # post sticky PR comment

jobs:
  whatif:
    name: Bicep what-if preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Azure login (OIDC — no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve SP object ID for Bicep param
        run: |
          # az ad sp show returns the *service principal* object ID
          # (the enterprise-app object in the tenant) — distinct from the
          # *app registration* object ID returned by `az ad app show`.
          # Bicep role assignments require the SP object ID, which is
          # what main.bicepparam expects via GHA_SP_OBJECT_ID.
          SP_OID=$(az ad sp show --id ${{ vars.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "GHA_SP_OBJECT_ID=$SP_OID" >> "$GITHUB_ENV"

      - name: Verify GHA_SP_OBJECT_ID export persisted
        run: |
          test -n "$GHA_SP_OBJECT_ID" || { echo "::error::GHA_SP_OBJECT_ID empty in subsequent step"; exit 1; }
          echo "SP OID present (length=${#GHA_SP_OBJECT_ID})"

      - name: Resolve current live container image
        run: |
          # Fetch the image currently running in prod so the bicepparam's
          # readEnvironmentVariable resolves to the live image rather than
          # the quickstart placeholder — prevents a phantom containerImage
          # diff appearing in every what-if.
          set +e
          IMG=$(az containerapp show --name ca-mom-bot --resource-group mom-bot \
            --query "properties.template.containers[0].image" -o tsv 2>&1)
          RC=$?
          set -e
          if [ $RC -ne 0 ]; then
            echo "::notice::Container app not found (cold-start scenario) — using bicepparam quickstart default"
            # CONTAINER_IMAGE intentionally left unset; bicepparam's
            # readEnvironmentVariable('CONTAINER_IMAGE', '<quickstart>')
            # falls back to the default.
          else
            echo "CONTAINER_IMAGE=$IMG" >> "$GITHUB_ENV"
          fi

      - name: Run az deployment sub create --what-if
        id: whatif
        run: |
          set +e
          az deployment sub create --what-if \
            --location eastus2 \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            > whatif-output.txt 2>&1
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          # Always show output in the log for debugging
          cat whatif-output.txt
          # Don't fail the job on non-zero — we still want to post the output
          exit 0

      - name: Build comment body
        run: |
          {
            echo '### 🔍 Bicep what-if preview'
            echo
            if [ "${{ steps.whatif.outputs.rc }}" = "0" ]; then
              echo '**Result:** ✅ Completed'
            else
              echo '**Result:** ⚠️ Errored (non-blocking — see output below)'
            fi
            echo
            echo '<details>'
            echo '<summary>What-if output</summary>'
            echo
            echo '```'
            cat whatif-output.txt
            echo '```'
            echo
            echo '</details>'
            echo
            echo '_Informational only — what-if is not merge-gated per plan §2.2._'
            echo
            echo "🤖 _Generated by Claude Code on behalf of @${{ github.actor }}_"
          } > comment-body.md

      - name: Post sticky what-if comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2.9.4
        with:
          header: bicep-whatif
          path: comment-body.md
