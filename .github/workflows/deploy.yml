name: Deploy (mom-bot)

# A++ dev/prod model: this workflow always deploys to prod.
# Local dev uses the developer's laptop + az login + dev-* secrets in KV.
# No target: dev|prod input — there is only one deployment target.
#
# PREREQUISITE: complete infra/aad-runbook.md before this workflow can succeed.
# Repo variables required:
#   AZURE_CLIENT_ID        — app registration client ID (mom-bot-gha)
#   AZURE_TENANT_ID        — 48bca6c3-6d4f-4884-bc1a-648ae2362a32
#   AZURE_SUBSCRIPTION_ID  — 213aa1f8-32d1-4ffe-8f4d-6e60f1cd9dc0
#

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA of the image to deploy. Defaults to HEAD of `main`. Must match a SHA that has a built GHCR image."
        type: string
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login to Azure
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure login (OIDC — no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image SHA
        id: resolve_sha
        run: |
          SHA="${{ inputs.commit_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved image SHA: $SHA"

      - name: Verify image exists in GHCR
        run: |
          SHA="${{ steps.resolve_sha.outputs.sha }}"
          if ! docker manifest inspect "ghcr.io/glitchwerks/mom-bot:$SHA" >/dev/null 2>&1; then
            echo "::error::Image ghcr.io/glitchwerks/mom-bot:$SHA does not exist in GHCR. Has build-image.yml run for this SHA on a green-CI main commit?"
            exit 1
          fi
          echo "Image exists: ghcr.io/glitchwerks/mom-bot:$SHA"

      - name: Deploy container image to prod
        run: |
          az containerapp update \
            --name ca-mom-bot \
            --resource-group mom-bot \
            --image ghcr.io/glitchwerks/mom-bot:${{ steps.resolve_sha.outputs.sha }}
