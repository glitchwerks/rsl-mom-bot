name: Deploy (mom-bot)

# A++ dev/prod model: this workflow always deploys to prod.
# Local dev uses the developer's laptop + az login + dev-* secrets in KV.
# No target: dev|prod input — there is only one deployment target.
#
# PREREQUISITE: complete infra/aad-runbook.md before this workflow can succeed.
# Repo variables required:
#   AZURE_CLIENT_ID        — app registration client ID (mom-bot-gha)
#   AZURE_TENANT_ID        — 48bca6c3-6d4f-4884-bc1a-648ae2362a32
#   AZURE_SUBSCRIPTION_ID  — 213aa1f8-32d1-4ffe-8f4d-6e60f1cd9dc0
#

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA of the image to deploy. Defaults to HEAD of `main`. Must match a SHA that has a built GHCR image."
        type: string
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login to Azure
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure login (OIDC — no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify required KV secrets are present
        # Fails fast if any secret has not been set before deploying the image.
        # This guards against deploying a bot that will crash at startup because
        # a required secret is missing.  Add new secret names here whenever a
        # new load_secret() call is introduced in the codebase.
        run: |
          VAULT="kv-mombot-eastus2"
          REQUIRED_SECRETS=(
            "prod-discord-token"
            "prod-guild-id"
            "prod-reminder-channel-name"
            "prod-reminder-mention-role-name"
            "prod-siege-web-url"
            "prod-siege-web-bot-token"
          )
          MISSING=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if ! az keyvault secret show --vault-name "$VAULT" --name "$secret" \
                  --query "id" -o tsv >/dev/null 2>&1; then
              MISSING+=("$secret")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required KV secrets: ${MISSING[*]}"
            echo "Set them with: az keyvault secret set --vault-name $VAULT --name <name> --value <value>"
            exit 1
          fi
          echo "All required KV secrets present."

      - name: Resolve image SHA
        id: resolve_sha
        run: |
          SHA="${{ inputs.commit_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved image SHA: $SHA"

      - name: Verify image exists in GHCR
        run: |
          SHA="${{ steps.resolve_sha.outputs.sha }}"
          if ! docker manifest inspect "ghcr.io/glitchwerks/mom-bot:$SHA" >/dev/null 2>&1; then
            echo "::error::Image ghcr.io/glitchwerks/mom-bot:$SHA does not exist in GHCR. Has build-image.yml run for this SHA on a green-CI main commit?"
            exit 1
          fi
          echo "Image exists: ghcr.io/glitchwerks/mom-bot:$SHA"

      - name: Update migrations job image to deploy SHA
        # Pin the migrations job to the exact same image SHA being deployed
        # so migrations always run against the schema expected by the new code.
        # This mirrors the az containerapp update call below but targets the job.
        run: |
          if ! az containerapp job show --name job-mom-bot-migrate --resource-group mom-bot &>/dev/null; then
            echo "::error::Migration job 'job-mom-bot-migrate' does not exist. Run infra-deploy.yml first to create infrastructure."
            exit 1
          fi
          az containerapp job update \
            --name job-mom-bot-migrate \
            --resource-group mom-bot \
            --image ghcr.io/glitchwerks/mom-bot:${{ steps.resolve_sha.outputs.sha }}

      - name: Run migrations via Container Apps Job
        id: migrate_job
        # Trigger the job and wait for the LRO to complete (default — no --no-wait).
        # The CLI exits non-zero if the job execution fails; that is the blocking
        # signal.  Application log capture follows in the next step (OQ-3).
        run: |
          az containerapp job start \
            --name job-mom-bot-migrate \
            --resource-group mom-bot

      - name: Fetch migration logs from Log Analytics (OQ-3 poll-with-retry)
        if: always() && steps.migrate_job.outcome != 'skipped'
        # OQ-3 binding decision: poll with retry — a single KQL fetch is
        # rejected because ContainerAppConsoleLogs_CL has a documented
        # multi-minute ingestion lag (spec §3 Q6).
        #
        # Strategy:
        #   1. Get the execution name from the most-recent job execution.
        #   2. Resolve the Log Analytics workspace customer ID.
        #   3. Retry the KQL query until logs appear or a 5-minute timeout hits.
        #      The table returns empty OR raises BadArgumentError during backfill;
        #      both are treated as "not ready yet".
        run: |
          RG=mom-bot
          JOB=job-mom-bot-migrate

          # Get execution name of the most-recent job run.
          EXEC_NAME=$(az containerapp job execution list \
            --name "$JOB" --resource-group "$RG" \
            --query 'sort_by(@, &properties.startTime)[-1].name' -o tsv)
          echo "Execution name: $EXEC_NAME"

          if [ -z "$EXEC_NAME" ]; then
            echo "::warning::Could not retrieve execution name — skipping log fetch."
            if [ "${{ steps.migrate_job.outcome }}" = "failure" ]; then
              echo "::error::Migration job FAILED and execution name is unavailable. Check Azure portal for job execution details."
              exit 1
            fi
            exit 0
          fi

          # Resolve Log Analytics workspace customer ID.
          WORKSPACE_ID=$(az monitor log-analytics workspace list \
            --resource-group "$RG" \
            --query "[?starts_with(name,'log-mom-bot-')].customerId | [0]" \
            -o tsv)
          if [ -z "$WORKSPACE_ID" ]; then
            echo "::warning::Could not resolve Log Analytics workspace — skipping log fetch."
            exit 0
          fi
          echo "Log Analytics workspace: $WORKSPACE_ID"

          # Poll until logs appear or 5-minute timeout.
          TIMEOUT=300
          ELAPSED=0
          SLEEP_INTERVAL=15
          LOGS=""
          while [ $ELAPSED -lt $TIMEOUT ]; do
            set +e
            LOGS=$(az monitor log-analytics query \
              --workspace "$WORKSPACE_ID" \
              --analytics-query "ContainerAppConsoleLogs_CL
                | where ContainerGroupName_s startswith '${EXEC_NAME}'
                | order by TimeGenerated asc
                | project TimeGenerated, Log_s" \
              -o tsv 2>&1)
            STATUS=$?
            set -e

            # "BadArgumentError" is the documented transient error during
            # ingestion (spec §3 Q6 citation).  Treat it as "not ready yet".
            if echo "$LOGS" | grep -qi "BadArgumentError"; then
              echo "[log-fetch] BadArgumentError — table not ready, retrying in ${SLEEP_INTERVAL}s (elapsed ${ELAPSED}s)..."
              sleep $SLEEP_INTERVAL
              ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
              continue
            fi

            if [ $STATUS -ne 0 ]; then
              echo "::warning::Log Analytics query failed (exit $STATUS) — skipping log output."
              break
            fi

            if [ -z "$LOGS" ]; then
              echo "[log-fetch] empty result — logs not yet ingested, retrying in ${SLEEP_INTERVAL}s (elapsed ${ELAPSED}s)..."
              sleep $SLEEP_INTERVAL
              ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
              continue
            fi

            # Logs arrived.
            echo "--- alembic migration output ---"
            echo "$LOGS"
            echo "--- end migration output ---"
            break
          done

          # Propagate migration job failure as the PRIMARY signal.
          # The log-timeout warning is secondary — a real failure should not be
          # misread as "just a log ingestion issue".
          if [ "${{ steps.migrate_job.outcome }}" = "failure" ]; then
            echo "::error::Migration job FAILED — see above log output and job execution details in the Azure portal."
            exit 1
          fi

          if [ $ELAPSED -ge $TIMEOUT ] && [ -z "$LOGS" ]; then
            echo "::warning::Log fetch timed out after ${TIMEOUT}s — no migration output available. Check Log Analytics manually."
          fi

      - name: Deploy container image to prod
        run: |
          az containerapp update \
            --name ca-mom-bot \
            --resource-group mom-bot \
            --image ghcr.io/glitchwerks/mom-bot:${{ steps.resolve_sha.outputs.sha }}
