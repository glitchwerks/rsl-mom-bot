name: Deploy (mom-bot)

# A++ dev/prod model: this workflow always deploys to prod.
# Local dev uses the developer's laptop + az login + dev-* secrets in KV.
# No target: dev|prod input — there is only one deployment target.
#
# PREREQUISITE: complete infra/aad-runbook.md before this workflow can succeed.
# Repo variables required:
#   AZURE_CLIENT_ID        — app registration client ID (mom-bot-gha)
#   AZURE_TENANT_ID        — 48bca6c3-6d4f-4884-bc1a-648ae2362a32
#   AZURE_SUBSCRIPTION_ID  — 213aa1f8-32d1-4ffe-8f4d-6e60f1cd9dc0
#
# NOTE: image build+push to GHCR is not yet wired (Epic 1 work).
# For v0 testing, manually push an image to ghcr.io/glitchwerks/mom-bot
# and re-run this workflow. The workflow deploys whatever image exists at
# ghcr.io/glitchwerks/mom-bot:<github.sha>.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login to Azure
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image to prod
        run: |
          az containerapp update \
            --name ca-mom-bot \
            --resource-group mom-bot \
            --image ghcr.io/glitchwerks/mom-bot:${{ github.sha }}
