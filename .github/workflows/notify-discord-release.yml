# notify-discord-release.yml
#
# Manual remediation tool — re-posts the Discord release announcement for a
# given tag.  Use this if the automatic announcement in release.yml failed or
# needs to be re-sent for any reason.
#
# Trigger: workflow_dispatch only (input: tag, required).
#
# Auto-posting is now handled directly inside release.yml as a final `notify`
# job (needs: [verify, release]).  This workflow exists ONLY as a manual
# recovery path — see RELEASING.md § "What a release does".
#
# Required secret:
#   DISCORD_RELEASE_WEBHOOK_URL  — Discord Incoming Webhook URL.
#   To create one: Discord Server Settings → Integrations → Webhooks → New Webhook.
#   Copy the webhook URL and add it as a repository secret at:
#   https://github.com/glitchwerks/mom-bot/settings/secrets/actions
#
# Spec: glitchwerks/rsl-mom-apps#17 (coord) / glitchwerks/mom-bot#226 (impl)
# Fix:  glitchwerks/mom-bot#274

name: Notify Discord on Release (Manual Remediation)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to announce (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  notify:
    name: Post Discord release announcement
    runs-on: ubuntu-latest
    # This workflow only needs to read repo contents (for the extract script)
    # and read releases (for gh release view).
    permissions:
      contents: read

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}" ]; then
            echo "::error::DISCORD_RELEASE_WEBHOOK_URL secret is not set. See RELEASING.md § Discord Highlights convention for setup instructions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # -----------------------------------------------------------------------
      # Resolve the release from the input tag and extract the Highlights
      # section for the embed description.
      # -----------------------------------------------------------------------
      - name: Extract Highlights section
        id: highlights
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          HTML_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          # Fetch the release body from GitHub.
          RELEASE_BODY="$(gh release view "$TAG" --json body --jq '.body')"

          # Pass the release body through the extraction script.
          # The script reads from stdin and writes the final description to stdout.
          DESCRIPTION="$(printf '%s' "$RELEASE_BODY" | bash scripts/extract-highlights.sh "$TAG" "$HTML_URL")"

          # Write to GITHUB_OUTPUT using a heredoc delimiter so that multi-line
          # values and special characters are preserved correctly.
          {
            echo "description<<HIGHLIGHTS_EOF"
            printf '%s\n' "$DESCRIPTION"
            echo "HIGHLIGHTS_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "html_url=${HTML_URL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build embed and POST to Discord webhook (coord spec §R3).
      #
      # No idempotency guard — a manually-dispatched remediation run intends
      # to post.  The operator invoking this workflow accepts that the message
      # will appear in Discord.
      #
      # Embed shape mirrors release.yml notify job for consistency:
      #   title       — "mom-bot <tag>" or "[pre-release] mom-bot <tag>" (§R8)
      #   url         — GitHub Release URL
      #   description — Highlights text (or fallback)
      #   color       — 0x57F287 (Discord green)
      #   footer.text — "Published by <author>" (omitted if author absent)
      #   timestamp   — release.publishedAt (ISO 8601)
      # -----------------------------------------------------------------------
      - name: Post Discord embed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          TAG_NAME: ${{ steps.highlights.outputs.tag }}
          HTML_URL: ${{ steps.highlights.outputs.html_url }}
          DESCRIPTION: ${{ steps.highlights.outputs.description }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$TAG_NAME"

          # Fetch release metadata: author, published timestamp, pre-release flag.
          AUTHOR_LOGIN="$(gh release view "$TAG" --json author --jq '.author.login')"
          PUBLISHED_AT="$(gh release view "$TAG" --json publishedAt --jq '.publishedAt')"
          IS_PRERELEASE="$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')"

          # Build the embed title, prefixing [pre-release] when applicable (§R8).
          if [ "$IS_PRERELEASE" = "true" ]; then
            EMBED_TITLE="[pre-release] mom-bot $TAG_NAME"
          else
            EMBED_TITLE="mom-bot $TAG_NAME"
          fi

          # Build the footer object; omit if author is absent (defensive per §R3).
          if [ -n "$AUTHOR_LOGIN" ]; then
            FOOTER_JSON="$(jq -n --arg text "Published by $AUTHOR_LOGIN" '{"text": $text}')"
          else
            FOOTER_JSON="null"
          fi

          # Construct the full Discord webhook payload using jq so that all
          # string values are safely escaped (no manual JSON quoting).
          #
          # color: 0x57F287 = 5,763,719 decimal
          PAYLOAD="$(jq -n \
            --arg title       "$EMBED_TITLE" \
            --arg url         "$HTML_URL" \
            --arg description "$DESCRIPTION" \
            --arg timestamp   "$PUBLISHED_AT" \
            --argjson footer  "$FOOTER_JSON" \
            '{
              embeds: [{
                title:       $title,
                url:         $url,
                description: $description,
                color:       5763719,
                footer:      (if $footer != null then $footer else empty end),
                timestamp:   $timestamp
              }]
            }'
          )"

          # POST to Discord.  Fail the step on non-2xx so CI shows a red check
          # rather than silently dropping the notification.  Capture the response
          # body so that on failure the error reason is visible in the workflow log.
          RESPONSE_BODY="$(mktemp)"
          HTTP_STATUS="$(curl -s -o "$RESPONSE_BODY" -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Discord webhook returned HTTP $HTTP_STATUS — notification not delivered."
            echo "Response body: $(cat "$RESPONSE_BODY")"
            exit 1
          fi

          echo "Discord notification delivered (HTTP $HTTP_STATUS)."
