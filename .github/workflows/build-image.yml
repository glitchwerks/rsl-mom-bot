name: Build and push image to GHCR

# Triggered by the workflow_run event rather than push/pull_request.
# This is the structural guarantee that an image is only ever built and pushed
# after the CI workflow has reported success for the same SHA.  The alternative
# — a push trigger with a manual "check CI first" step — is a convention, not
# a guarantee.  workflow_run provides the guarantee at the GitHub Actions layer.
#
# Scoped to branches: [main] so sub-branch merges into epic-* intermediate
# branches do NOT trigger an image push.  Only pushes that land on main
# (after epic-* PRs merge into main) produce GHCR images.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Per-SHA concurrency.  cancel-in-progress is intentionally false: cancelling
# an in-flight build for an earlier SHA would leave that SHA without a GHCR
# image, creating exactly the kind of build/CI-SHA mismatch this gate exists
# to prevent.
concurrency:
  group: build-image-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      # Check out the exact SHA that CI greened, not whatever HEAD is at the
      # moment this workflow_run event fires (which could be a later commit).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          push: true
          tags: ghcr.io/glitchwerks/mom-bot:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
